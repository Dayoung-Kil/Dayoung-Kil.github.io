    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- DK monogram tile -->
  <rect x="90" y="190" width="250" height="250" rx="32" fill="#ffffff" fill-opacity="0.14"/>
