  projects:
    title: "Projects"
    text: "Explore the work I've been involved in."
    section: projects
    closebutton: "Close Project"
    items: # projects 데이터를 items로 정의
      - title: "Zero-Shot Fall Detection: Leveraging Text Prompt in Vision-Language Models"
        subtitle: "2023.08 - 2023.11"
        github_url: "https://github.com/VIP-Projects/Zero-Shot-Anomaly-Detection"
        thumbnail: "assets/img/projects/fall1.png"
        image: "assets/img/projects/fall2.png"
        alt: "Zero-Shot Fall Detection FrameWork"
        content: |
          시각-언어 모델을 이용하여 데이터셋을 훈련없이 Abnormal Detection이라는 일반적인 프레임워크 생성.
          빠른 신고와 조치가 필요한 다양한 상황에서 정교화된 Prompt 기술로 학습 없이 즉각적인 대응이 가능한 시스템 구축,
          기존 연구인 Fall Detection을 사례연구로 먼저 시도했고, 다양한 상황에서의 이상 감지로 일반화 가능성을 확인.<br><br>
          [기대효과]<br>
          낙상 예방과 안전 강화, 의료 모니터링 향상: 낙상을 빠르게 감지하고 경고하는 시스템을 통해 부상 예방 및 심각성을 감소시키는 데 도움. <br>
          데이터 수집 및 학습 비용 감소: 수집하고 학습하지 못한 문제 상황에도 Zero-shot 기반의 일반적인 방법론을 통해 데이터 수집 및 학습 비용 절감이 가능.<br>
          스마트 팩토리 자동화 및 최적화: Zero-shot 감지를 통해 학습되지 않은 불량을 검출하여 제조 자동화 및 최적화에 기여.<br>

      - title: "V Fit : Multi-modal AI-based Firtual Fitting APP Service"
        subtitle: "2023.06 - 2023.09"
        github_url: "https://github.com/VIP-Projects/V-Fit"
        thumbnail: "assets/img/projects/vfit1.png"
        image: "assets/img/projects/vfit2.png"
        alt: "Multi-modal AI-based Firtual Fitting APP Service FrameWork"
        content: |
          사용자가 의상 구매 및 헤어 서비스를 결정하기 전에 자신의 스타일을 확인하여, 결정에 소요되는 시간 및 비용을 절약하고 만족도를 높일 수 있는 의상 및 헤어 가상 피팅 앱 서비스를 제공.
          ACGPN(Advanced Clothing and Garment Personalization Network) 기반의 가상 의상 피팅 및 옷 추천 서비스를 제공. StyleCLIP 기반의 가상 헤어 피팅 서비스 제공. <br><br>
          [기대효과]<br>
          소비자 뿐만 아니라 온라인 쇼핑몰이 반품으로 인한 감정적, 경제적 손실을 줄일 수 있음.<br>
          지인에게 잘 어울리는 의류 스타일과 색상 확인하여 옷을 선물해주기에 용이함.<br>
          스타일 변경 실패에 대한 두려움을 줄일 수 있으며, 헤어 관련 업체와 고객 간의 갈등을 줄일 수 있음.<br>
          자신에게 어울리는 의상 및 헤어 스타일을 잘 알지 못하는 20-30대 연령층이 새로운 고객이 될 수 있으며, 본인의 스타일이 확립된 40-50대 연령층에게 스타일 변경에 대한 흥미를 유발할 수 있음.<br>

      - title: "Food Calorie Estimation"
        subtitle: "2022.04 - 2022.06"
        github_url: "https://github.com/Dayoung-Kil/Food_Calorie_Estimation"
        thumbnail: "assets/img/projects/food1.png"
        image: "assets/img/projects/food2.png"
        alt: "Food Calorie Estimation FrameWork"
        content: |
          Food Detection 및 Volume Estimation을 통해, 이미지 내 음식 인식 후 칼로리 계산. 음식 종류와 g수에 따른 칼로리, 영양성분 표시.<br><br>
          [기대효과]<br>
          일일이 음식의 종류와 양을 기입하는 불편함 없이, 사진 한장으로 칼로리 계산 가능. <br>
          부피를 계산하여 칼로리를 계산하기 때문에 보다 정확함.<br>
          
      - title: "Face Out : A Website that Mosaic People's Faces through Face Recognition"
        subtitle: "2021.03 - 2021.11"
        github_url: "https://github.com/2021-1-SSU-CapstoneDesign/Face-Out"
        thumbnail: "assets/img/projects/face1.png"
        image: "assets/img/projects/face2.png"
        alt: "A Website that Mosaic People's Faces through Face Recognition FrameWork"
        content: |
          Face Recognition을 통해 지정된 사람을 제외한 다른 사람들의 얼굴을 모자이크 처리하는 웹 서비스 제작. 
          촬영된 영상에서 특정 인물 이외의 인물들을 모자이크 가능.
          유튜버와 같은 크리에이터들이 많이 생겨나면서 미처 모자이크 처리되지 못한 사람들의 초상권 보호.<br><br>
          [기대효과]<br>
          모자이크 처리 제외 사진 1장만 넣어도 자동으로 모자이크 처리.<br>
          어플을 따로 다운받지 않아도 웹에서 서비스를 이용 가능.<br>
          홈페이지에 모자이크한 사진 또는 영상을 보관 가능.<br>
          사람 얼굴이라는 특정부분만을 모자이크 처리 가능.<br>
          모자이크를 하고자 하는 사람이 다수일 경우, 한번의 클릭으로 빠르게 사람 얼굴을 모자이크 가능.<br>

      - title: "3D Room Reconstruction Using HorizonNet"
        subtitle: "2021.05 - 2021.06"
        github_url: "https://github.com/2021-1-SSU-Computer-Vision/3D_Room_Reconstruction"
        thumbnail: "assets/img/projects/room1.png"
        image: "assets/img/projects/room2.png"
        alt: "3D Room Reconstruction Using HorizonNet FrameWork"
        content: |
          HorizonNet 연구 분석 후, 모델을 훈련시키고 직접 촬영한 이미지를 적용하여 3D Room 복원.
          한 장의 파노라마 이미지만을 사용해서 방을 3D로 복원 가능.
          HorizonNet은 Manhattan World 가정을 기반으로 하여 짧은 시간에 방의 구조를 추측하는 방법으로 HorizonNet을 통해 기존 SFM(Structure From Motion) 방법에서의 다양한 문제점(조명에 영향 받음, 많은 시간 소요, 무수히 많은 이미지 필요, 유리 인식 불가 등)들을 해결할 수 있을 거라 판단함.<br><br>
          [기대효과]<br>
          기존 3D room 복원은 왜곡이 심한 부분이 많고 방 크기나 비율이 실제와 달라 보이는 경우가 많은데, 이러한 문제점을 개선하여 건축가 및 인테리어 디자이너, 혹은 이사를 위해 집 구조를 알아보는 사람들에게 도움이 될 수 있음. <br>
          일반적인 RGB 카메라로 촬영된 파노라마 사진 한장으로 쉽게 3D Room을 구현할 수 있어 많은 분야에 있어 용이할 것임. <br>
          만약 구현된 3D 모델에서 가구와 같은 디테일한 요소들을 보완할 수 있다면, 온라인 박람회나 온라인 집들이 등 가상현실의 배경을 구축하는 것에 도움이 될 것임. <br>

                    
