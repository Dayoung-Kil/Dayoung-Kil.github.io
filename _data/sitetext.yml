  projects:
    title: "Projects"
    text: "Explore the work I’ve been involved in."
    section: projects
    closebutton: "Close Project"
    items: # projects 데이터를 items로 정의
      - title: "Zero-Shot Fall Detection: Leveraging Text Prompt in Vision-Language Models"
        subtitle: "2023.08 - 2023.11"
        thumbnail: "assets/img/projects/fall1.png"
        image: "assets/img/projects/fall2.png" # 모달용 큰 이미지
        alt: "Project 1 description" # 이미지 대체 텍스트
        content: |
          시각-언어 모델을 이용하여 데이터셋을 훈련없이 Abnormal Detection이라는 일반적인 프레임워크 생성.
          빠른 신고와 조치가 필요한 다양한 상황에서 정교화된 Prompt 기술로 학습 없이 즉각적인 대응이 가능한 시스템 구축,
          기존 연구인 Fall Detection을 사례연구로 먼저 시도했고, 다양한 상황에서의 이상 감지로 일반화 가능성을 확인.<br><br>
          [기대효과]<br>
          낙상 예방과 안전 강화, 의료 모니터링 향상: 낙상을 빠르게 감지하고 경고하는 시스템을 통해 부상 예방 및 심각성을 감소시키는 데 도움. <br>
          데이터 수집 및 학습 비용 감소: 수집하고 학습하지 못한 문제 상황에도 Zero-shot 기반의 일반적인 방법론을 통해 데이터 수집 및 학습 비용 절감이 가능.<br>
          스마트 팩토리 자동화 및 최적화: Zero-shot 감지를 통해 학습되지 않은 불량을 검출하여 제조 자동화 및 최적화에 기여.<br><br>
          # [역할]<br>
          # 데이터 수집 & PPT 제작
      - title: "V Fit : Multi-modal AI-based Firtual Fitting APP Service"
        subtitle: "2023.06 - 2023.09"
        thumbnail: "assets/img/portfolio/04-thumbnail.jpg"
        image: "assets/img/portfolio/04-thumbnail.jpg" # 모달용 큰 이미지
        alt: "Project 1 description" # 이미지 대체 텍스트
        content: |
          사용자가 의상 구매 및 헤어 서비스를 결정하기 전에 자신의 스타일을 확인하여, 결정에 소요되는 시간 및 비용을 절약하고 만족도를 높일 수 있는 의상 및 헤어 가상 피팅 앱 서비스를 제공.
          ACGPN(Advanced Clothing and Garment Personalization Network) 기반의 가상 의상 피팅 및 옷 추천 서비스를 제공. StyleCLIP 기반의 가상 헤어 피팅 서비스 제공. <br><br>
          [기대효과]<br>
          소비자 뿐만 아니라 온라인 쇼핑몰이 반품으로 인한 감정적, 경제적 손실을 줄일 수 있음.<br>
          지인에게 잘 어울리는 의류 스타일과 색상 확인하여 옷을 선물해주기에 용이함.<br>
          스타일 변경 실패에 대한 두려움을 줄일 수 있으며, 헤어 관련 업체와 고객 간의 갈등을 줄일 수 있음.<br>
          자신에게 어울리는 의상 및 헤어 스타일을 잘 알지 못하는 20-30대 연령층이 새로운 고객이 될 수 있으며, 본인의 스타일이 확립된 40-50대 연령층에게 스타일 변경에 대한 흥미를 유발할 수 있음.<br><br>
          # [역할]<br>
          # Virtual Hair Fitting Model & APP UI"
      - title: "Food Calorie Estimation"
        subtitle: "2022.04 - 2022.06"
        thumbnail: "assets/img/projects/food1.png"
        image: "assets/img/projects/food2.png" # 모달용 큰 이미지
        alt: "Project 1 description" # 이미지 대체 텍스트
        content: "Food Detection 및 Volume Estimation을 통해, 이미지 내 음식의 칼로리 계산. 일일이 음식의 종류와 양을 기입하는 불편함 없이, 사진 한장으로 칼로리 계산 가능. 부피를 계산하여 칼로리를 계산하기 때문에 보다 정확함. / Volume Estimation & Calorie Estimation"
      - title: "Face Out : A Website that Mosaic People's Faces through Face Recognition"
        subtitle: "2021.03 - 2021.11"
        thumbnail: "assets/img/portfolio/04-thumbnail.jpg"
        image: "assets/img/portfolio/04-thumbnail.jpg" # 모달용 큰 이미지
        alt: "Project 1 description" # 이미지 대체 텍스트
        content: "Face Recognition을 통해 지정된 사람을 제외한 다른 사람들의 얼굴을 모자이크 처리하는 웹 서비스 제작 / Web Front-End & Back-End & Face Recognition Model Request"
      - title: "3D Room Reconstruction Using HorizonNet"
        subtitle: "2021.05 - 2021.06"
        thumbnail: "assets/img/portfolio/04-thumbnail.jpg"
        image: "assets/img/portfolio/04-thumbnail.jpg" # 모달용 큰 이미지
        alt: "Project 1 description" # 이미지 대체 텍스트
        content: "HorizonNet 연구 분석 후, 모델을 훈련시키고 직접 촬영한 이미지를 적용하여 3D Room 복원"
      - title: "3D Room Reconstruction Using HorizonNet"
        subtitle: "2021.05 - 2021.06"
        thumbnail: "assets/img/portfolio/04-thumbnail.jpg"
        image: "assets/img/portfolio/04-thumbnail.jpg" # 모달용 큰 이미지
        alt: "Project 1 description" # 이미지 대체 텍스트
        content: "HorizonNet 연구 분석 후, 모델을 훈련시키고 직접 촬영한 이미지를 적용하여 3D Room 복원"

