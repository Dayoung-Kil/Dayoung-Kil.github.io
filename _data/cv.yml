cv:
  name: Dayoung Kil
  label: Ph.D. Student
  email: dayoungkil@soongsil.ac.kr
  location: Seoul, Republic of Korea
  image: ""
  summary: "Ph.D. Student at the Visual Intelligence and Platform (VIP) Lab, Soongsil University, working under Prof. Seong-heum Kim. My research centers on hardware-efficient artificial intelligence — developing deep learning models that remain performant under real-world compute and latency constraints, with current emphasis on token pruning and efficient inference for large vision-language models (LVLMs) and multimodal LLMs."

