    Publications:
      - title: One-cycle Structured Pruning with Stability Driven Structure Search
        authors:
          - Deepak Ghimire
          - Dayoung Kil
          - Seonghwan Jeong
          - Jaesik Park
          - Seong-heum Kim
        publisher: IEEE/CVF Winter Conference on Applications of Computer Vision (WACV)
        releaseDate: 2026
        url: https://arxiv.org/abs/2501.13439
        summary: An efficient one-cycle structured pruning framework that integrates pre-training, pruning, and fine-tuning into a single training cycle, achieving state-of-the-art accuracy with minimal training time on CIFAR-10/100, ImageNet, and VGGNet/ResNet/MobileNet/ViT.

      - title: A Study of Structured Pruning for Hybrid Neural Networks
        authors:
          - Deepak Ghimire
          - Dayoung Kil
          - Seong-heum Kim
        publisher: 24th International Conference on Control, Automation and Systems (ICCAS)
        releaseDate: 2024-10-29
        url: https://ieeexplore.ieee.org/document/10773379
        summary: Structured pruning for CNN&ndash;transformer hybrid architectures with automatic selection of filter pruning criteria and layer-wise pruning rates.

      - title: A Survey on Efficient Convolutional Neural Networks and Hardware Acceleration
        authors:
          - Deepak Ghimire
          - Dayoung Kil
          - Seong-heum Kim
        publisher: Electronics (MDPI), 11(6), 945
        releaseDate: 2022-02-23
        url: https://www.mdpi.com/2079-9292/11/6/945
        summary: A comprehensive survey on quantized/binarized models, optimized architectures, and resource-constrained systems for efficient deep learning.

      - title: Lightweight Room Layout Estimation using a Single Panoramic Image
        authors:
          - Dayoung Kil
          - Seong-heum Kim
        publisher: 22nd International Conference on Control, Automation and Systems (ICCAS)
        releaseDate: 2022-11-27
        url: https://ieeexplore.ieee.org/document/10003901
        summary: Lightweight HorizonNet variant using MnasNet and GRU, reducing parameters to roughly half while maintaining competitive performance.

      - title: Lightweight Deep Learning for Room Layout Estimation with a Single Panoramic Image
        authors:
          - Dayoung Kil
          - Seong-heum Kim
        publisher: Journal of Institute of Control, Robotics and Systems (KCI), 28(10)
        releaseDate: 2022-10
        url: https://www.kci.go.kr/kciportal/ci/sereArticleSearch/ciSereArtiView.kci?sereArticleSearchBean.artiId=ART002884719
        summary: KCI journal version of the lightweight room layout estimation work; validated on Stanford2D3D, PanoContext, and real-world panorama images.

